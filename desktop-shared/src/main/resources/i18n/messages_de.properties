# Analytics Consent
analytics.consent.title=Helfen Sie mit, Askimo für alle zu verbessern
analytics.consent.message=Sie können dazu beitragen, Askimo zu verbessern, indem Sie anonyme Nutzungsdaten teilen — zum Beispiel, welche Funktionen Sie nutzen und mit welchen KI-Anbietern Sie sich verbinden. Kein Text, keine Prompts, keine Dateien, keine API-Schlüssel. Niemals.
analytics.consent.detail=Dies hilft uns zu verstehen, was am wichtigsten ist, und die Entwicklung darauf zu konzentrieren, wo es darauf ankommt. Sie können dies jederzeit in den Einstellungen deaktivieren.
